<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Motion Quest</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="pageHome" class="page active">
  <div class="card">
    <div class="logo">🎮</div>
    <h1>Thai Motion Quest</h1>
    <p>เกมภาษาไทยขยับร่างกายด้วย AI</p>
    <button id="btnGoSelect">เริ่มเล่น</button>
  </div>
</section>

<section id="pageSelect" class="page">
  <div class="card">
    <h1>เลือกผู้เล่น ป.๔</h1>
    <input id="searchStudent" placeholder="ค้นหาชื่อนักเรียน...">
    <div id="studentList"></div>
  </div>
</section>

<section id="pageReady" class="page">
  <div class="card">
    <div class="avatar">🧒</div>
    <h2 id="readyName"></h2>
    <p id="readyClass"></p>
    <button id="btnStartGame">เริ่มเกม</button>
    <button id="btnBackSelect" class="secondary">ย้อนกลับ</button>
  </div>
</section>

<section id="pageGame" class="page game-page">
  <div class="topbar">
    <div class="pill">⭐ คะแนน <span id="score">๐</span></div>
    <div class="pill player" id="playerName">ผู้เล่น</div>
    <div class="pill">⏱ เวลา <span id="time">๖๐</span></div>
  </div>

  <div class="camera-box">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="poseCanvas"></canvas>
    <div class="camera-hint">ยืนกลางกล้อง แล้วเอนซ้าย/ขวา</div>
  </div>

  <div class="question-panel">
    <div class="stage-title">📚 ด่านภาษาไทย</div>
    <div id="questionText">กำลังโหลดโจทย์...</div>
  </div>

  <div class="answer-row">
    <div id="leftBox" class="answer-card left-card">
      <span>⬅️</span>
      <span class="word">ซ้าย</span>
    </div>
    <div id="rightBox" class="answer-card right-card">
      <span class="word">ขวา</span>
      <span>➡️</span>
    </div>
  </div>

  <div id="feedback"></div>
</section>

<section id="pageSummary" class="page">
  <div class="card">
    <h1>สรุปผล</h1>
    <h2 id="sumName"></h2>
    <p>คะแนน: <span id="sumScore"></span></p>
    <p>ถูก: <span id="sumCorrect"></span></p>
    <p>ผิด: <span id="sumWrong"></span></p>
    <p>ความแม่นยำ: <span id="sumAccuracy"></span>%</p>
    <button id="btnPlayAgain">เล่นอีกครั้ง</button>
  </div>
</section>

<div id="debugBox">พร้อมเริ่มระบบ</div>

<script src="api.js"></script>
<script src="ui.js"></script>
<script src="camera.js"></script>
<script src="pose.js"></script>
<script src="game.js"></script>
<script src="audio.js"></script>
<script src="app.js"></script>

</body>
</html>
